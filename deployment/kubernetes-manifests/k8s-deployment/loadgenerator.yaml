apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: store
  name: ts-loadgenerator
spec:
  selector:
    matchLabels:
      app: ts-loadgenerator
  replicas: 1
  template:
    metadata:
      labels:
        app: ts-loadgenerator
    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 5
      restartPolicy: Always
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
      - command:
        - /bin/sh
        - -c
        - |
          echo "Init container checking Frontend service: ${FRONTEND_ADDR}..."
          # Check gateway connectivity using busybox wget
          if wget --spider --timeout=10 http://${FRONTEND_ADDR} 2>&1 | grep -qE "(Connecting|remote file exists)"; then
              echo "Frontend service is reachable!"
              exit 0
          else
              echo "Error: Could not reach Frontend service"
              exit 1
          fi
        name: frontend-check
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - all
          privileged: false
          readOnlyRootFilesystem: true
        image: busybox:latest
        env:
        - name: FRONTEND_ADDR
          value: "ts-ui-dashboard:8080"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - node8
      containers:
      - name: ts-loadgenerator
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - all
          privileged: false
          readOnlyRootFilesystem: true
        image: newrelic/train-ticket:ts-loadgenerator-0.1.0
        imagePullPolicy: Always
        env:
        - name: FRONTEND_ADDR
          value: "ts-ui-dashboard:8080"
        - name: USERS
          value: "10"
        - name: SPAWN_RATE
          value: "2"
        - name: RUN_TIME
          value: ""
        resources:
          requests:
            cpu: 3000m
            memory: 10Gi
          limits:
            cpu: 3500m
            memory: 12Gi
---
apiVersion: v1
kind: Service
metadata:
  namespace: store
  name: ts-loadgenerator
spec:
  type: ClusterIP
  selector:
    app: ts-loadgenerator
  ports:
  - name: http
    port: 8089
    targetPort: 8089
